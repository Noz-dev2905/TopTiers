<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TopTiers - Minecraft PvP Rankings</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>

<header>
<h1>🏆 TopTiers</h1>
<p>The Ultimate Minecraft PvP Ranking Platform</p>
<input type="text" id="search" placeholder="Search player...">
</header>

<main>
<div class="leaderboard-container">
<div class="filter-buttons">
<button data-kit="all">All Kits</button>
<button data-kit="sword">Sword</button>
<button data-kit="axe">Axe</button>
<button data-kit="crystal">Crystal</button>
<button data-kit="pot">Pot</button>
<button data-kit="diasmp">Diamond SMP</button>
<button data-kit="mace">Mace</button>
<button data-kit="nethpot">Netherite Pot</button>
</div>

<div id="leaderboard" class="cards-container"></div>
</div>
</main>

<footer>
<p>TopTiers © 2026</p>
</footer>

<script src="script.js"></script>
</body>
</html>
